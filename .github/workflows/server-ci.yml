name: Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    name: Lint, type check, and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: server/pyproject.toml

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run --group lint ruff check .

      - name: Ruff format check
        run: uv run --group lint ruff format --check .

      - name: Mypy
        run: uv run --group type mypy .

      - name: Pytest
        run: uv run --group test pytest --tb=short
