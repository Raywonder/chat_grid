# Staged user-facing Endiginous web alias.
# Keep /chatgrid/ as the compatibility path for existing clients/bookmarks.

ProxyPass        /endiginous/ws  ws://127.0.0.1:18765/endiginous/ws
ProxyPassReverse /endiginous/ws  ws://127.0.0.1:18765/endiginous/ws

ProxyPass        /endiginous/auth/session/  http://127.0.0.1:18765/endiginous/auth/session/
ProxyPassReverse /endiginous/auth/session/  http://127.0.0.1:18765/endiginous/auth/session/

ProxyPass        /endiginous/voice/  http://127.0.0.1:18765/voice/
ProxyPassReverse /endiginous/voice/  http://127.0.0.1:18765/voice/

<LocationMatch "^/endiginous/?$|^/endiginous/index\.html$">
  Header set Cache-Control "no-store, no-cache, must-revalidate"
  Header set Pragma "no-cache"
  Header set Expires "0"
</LocationMatch>
