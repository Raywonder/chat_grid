# Include these locations inside the blind.software TLS server block.
# /chatgrid/ remains the compatibility path for existing clients.

location = /endiginous/ws {
    proxy_pass http://127.0.0.1:18765/chatgrid/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header Origin https://blind.software;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 86400;
}

location ^~ /endiginous/auth/session/ {
    proxy_pass http://127.0.0.1:18765/chatgrid/auth/session/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin https://blind.software;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
}

location ^~ /endiginous/voice/ {
    proxy_pass http://127.0.0.1:18765/voice/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin https://blind.software;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
}
